name: Update Contributors

on:
  push:
    branches:
      - main
  workflow_dispatch: # allow manual trigger

permissions:
  contents: write

jobs:
  update-contributors:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate contributors section and update README
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            // Fetch all contributors from GitHub API
            const contributors = await github.paginate(
              github.rest.repos.listContributors,
              {
                owner: context.repo.owner,
                repo: context.repo.repo,
                per_page: 100,
              }
            );

            // Filter out bots
            const humans = contributors.filter(c => c.type !== 'Bot');

            // Build the HTML table (5 per row)
            const cols = 5;
            let rows = '';
            for (let i = 0; i < humans.length; i += cols) {
              const chunk = humans.slice(i, i + cols);

              const avatars = chunk.map(c =>
                `<td align="center">
                  <a href="${c.html_url}">
                    <img src="${c.avatar_url}&s=80" width="80" height="80" style="border-radius:50%" alt="${c.login}"/><br/>
                    <sub><b>${c.login}</b></sub>
                  </a>
                </td>`
              ).join('\n');

              rows += `<tr>\n${avatars}\n</tr>\n`;
            }

            const section = `<!-- CONTRIBUTORS-START -->
            ## 👥 Contributors

            Thanks to everyone who has contributed to this project!

            <table>
            ${rows}</table>
            <!-- CONTRIBUTORS-END -->`;

            // Read current README
            const fs = require('fs');
            let readme = fs.readFileSync('README.md', 'utf8');

            // Replace existing section or append to end
            const startTag = '<!-- CONTRIBUTORS-START -->';
            const endTag   = '<!-- CONTRIBUTORS-END -->';

            if (readme.includes(startTag) && readme.includes(endTag)) {
              const before = readme.substring(0, readme.indexOf(startTag));
              const after  = readme.substring(readme.indexOf(endTag) + endTag.length);
              readme = before + section + after;
            } else {
              readme = readme.trimEnd() + '\n\n' + section + '\n';
            }

            fs.writeFileSync('README.md', readme);
            console.log(`✅ Updated README with ${humans.length} contributor(s).`);

      - name: Commit and push if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git diff --cached --quiet || git commit -m "docs: update contributors list [skip ci]"
          git push
